name: fiscal-local

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiscal}
      POSTGRES_USER: ${POSTGRES_USER:-fiscal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fiscal}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fiscal_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  fiscal_local_postgres:
