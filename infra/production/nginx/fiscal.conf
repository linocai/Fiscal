# /etc/nginx/sites-available/fiscal.conf
# This file is included inside nginx's `http` context on Ubuntu.

limit_req_zone $binary_remote_addr zone=fiscal_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=fiscal_ai:10m rate=10r/m;

upstream fiscal_api_backend {
    server 127.0.0.1:8010;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name fiscal.linotsai.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fiscal.linotsai.top;

    ssl_certificate /etc/letsencrypt/live/fiscal.linotsai.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fiscal.linotsai.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FiscalTLS:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 1m;
    limit_req_status 429;

    access_log /var/log/nginx/fiscal.access.log;
    error_log /var/log/nginx/fiscal.error.log warn;

    location = /api/v1/health/live {
        proxy_pass http://fiscal_api_backend;
        include proxy_params;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Readiness is intentionally reached directly over loopback by systemd, not publicly.
    location = /api/v1/health/ready {
        deny all;
    }

    location ^~ /api/v1/ai/ {
        limit_req zone=fiscal_ai burst=3 nodelay;
        limit_req zone=fiscal_api burst=20 nodelay;
        proxy_pass http://fiscal_api_backend;
        include proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 20s;
        proxy_read_timeout 65s;
    }

    location ^~ /api/v1/ {
        limit_req zone=fiscal_api burst=20 nodelay;
        proxy_pass http://fiscal_api_backend;
        include proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 20s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
