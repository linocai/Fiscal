# Temporary first-install site. Enable only this file until the certificate exists.
server {
    listen 80;
    listen [::]:80;
    server_name fiscal.linotsai.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        default_type text/plain;
        return 503 "Fiscal HTTPS is not active yet.\n";
    }
}
