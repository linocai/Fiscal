name: Fiscal
options:
  bundleIdPrefix: com.linotsai
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26.6"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: 1.1.0
    CURRENT_PROJECT_VERSION: 7
targets:
  FiscalKit:
    type: framework
    platform: [iOS, macOS]
    sources: Sources/FiscalKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linotsai.fiscal.kit
        DEFINES_MODULE: YES
  FiscaliOS:
    type: application
    platform: iOS
    sources: Apps/iOS
    info:
      path: Apps/iOS/Info.plist
      properties:
        CFBundleDisplayName: Fiscal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        FISCAL_API_BASE_URL: "$(FISCAL_API_BASE_URL)"
        NSPhotoLibraryUsageDescription: "Fiscal 读取你允许访问的截图，在设备端识别记账文字；图片不会上传。"
        PHPhotoLibraryPreventAutomaticLimitedAccessAlert: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
    dependencies:
      - target: FiscalKit_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linotsai.fiscal
        PRODUCT_NAME: Fiscal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: HX73DFL88G
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          FISCAL_API_BASE_URL: "http://127.0.0.1:8000"
        Release:
          FISCAL_API_BASE_URL: "https://fiscal.linotsai.top"
  FiscalmacOS:
    type: application
    platform: macOS
    sources: Apps/macOS
    info:
      path: Apps/macOS/Info.plist
      properties:
        CFBundleDisplayName: Fiscal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        FISCAL_API_BASE_URL: "$(FISCAL_API_BASE_URL)"
        LSApplicationCategoryType: public.app-category.finance
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - target: FiscalKit_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linotsai.fiscal.mac
        PRODUCT_NAME: Fiscal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          FISCAL_API_BASE_URL: "http://127.0.0.1:8000"
        Release:
          FISCAL_API_BASE_URL: "https://fiscal.linotsai.top"
          DEVELOPMENT_TEAM: HX73DFL88G
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
  FiscalKitTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/FiscalKitTests
    dependencies:
      - target: FiscalKit_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linotsai.fiscal.kit.tests
  FiscalUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: Tests/FiscalUITests
    dependencies:
      - target: FiscaliOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linotsai.fiscal.ui-tests
  FiscalSnapshotTool:
    type: tool
    platform: macOS
    sources: Tests/FiscalSnapshotTool
    dependencies:
      - target: FiscalKit_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linotsai.fiscal.snapshot-tool
schemes:
  FiscaliOS:
    build:
      targets:
        FiscaliOS: all
    run:
      config: Debug
    test:
      targets:
        - FiscalUITests
      environmentVariables:
        FISCAL_UI_TEST_DEVICE_TOKEN: integration-device-token
        FISCAL_QA_SCREENSHOT_DIR: "$(SRCROOT)/../docs/qa/p10/screenshots"
  FiscalmacOS:
    build:
      targets:
        FiscalmacOS: all
    run:
      config: Debug
    test:
      targets:
        - FiscalKitTests
      environmentVariables:
        FISCAL_UI_TEST_DEVICE_TOKEN: integration-device-token
        FISCAL_QA_SCREENSHOT_DIR: "$(SRCROOT)/../docs/qa/p10/screenshots"
